name: codeql

# Static analysis for Go. Default `security-and-quality` query suite catches
# the OWASP-style classes (path traversal, command injection, weak crypto,
# unchecked errors that mask security failures, etc.) without the noise of
# the experimental queries.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly drift scan — catches advisories that land in the database after
    # our last commit touched a vulnerable code path.
    - cron: '23 5 * * 1'

# Default-deny at workflow level. The analyze job re-grants security-events
# write so it can upload SARIF.
permissions:
  contents: read

concurrency:
  group: codeql-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  analyze:
    name: analyze (go)
    # CodeQL SARIF upload requires GitHub Advanced Security, which is free
    # for public repos only. Skip on private repos so the check doesn't
    # turn the rest of CI red — the workflow auto-enables when the repo
    # is flipped public.
    if: github.event.repository.private == false
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      security-events: write   # SARIF upload
      actions: read            # CodeQL reads workflow metadata
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6
        with:
          persist-credentials: false

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: '1.26'
          cache: true

      - name: init codeql
        uses: github/codeql-action/init@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v4.36.3
        with:
          languages: go
          queries: security-and-quality

      - name: build
        run: go build ./...

      - name: analyze
        uses: github/codeql-action/analyze@7188fc363630916deb702c7fdcf4e481b751f97a # v4.37.1
        with:
          category: "/language:go"
