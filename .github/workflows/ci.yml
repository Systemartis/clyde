name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache: true

      - name: go test
        run: go test -race -cover ./...

  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache: true

      - uses: golangci/golangci-lint-action@v9
        with:
          version: v2.11.4
          args: --timeout=5m

  fmt:
    name: gofmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'

      - name: gofmt diff
        run: |
          diff=$(gofmt -l .)
          if [ -n "$diff" ]; then
            echo "::error::gofmt found unformatted files:"
            echo "$diff"
            exit 1
          fi

  vuln:
    name: govulncheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache: true

      - name: install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: govulncheck
        run: govulncheck ./...

  smoke:
    name: smoke (--demo)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache: true

      - name: build
        run: go build -o /tmp/clyde ./cmd/clyde

      - name: --version (no-TTY smoke)
        run: /tmp/clyde --version

      - name: run --demo for 3s
        run: |
          # Demo mode does no live reads. We expect the binary to start a
          # bubbletea program, which requires a TTY — GitHub Actions runners
          # don't have one, so wrap the binary in `script` to allocate a pty.
          # SIGTERM (124 from timeout, or 143 from script forwarding) is the
          # success signal here.
          set +e
          timeout --signal=TERM 3 script -q -e -c "/tmp/clyde --demo --layout=stack" /dev/null
          code=$?
          if [ $code -ne 124 ] && [ $code -ne 143 ] && [ $code -ne 0 ]; then
            echo "::error::clyde --demo exited with $code"
            exit 1
          fi

  goreleaser-check:
    name: goreleaser (snapshot)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache: true

      - uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: '~> v2'
          args: release --snapshot --clean --skip=publish

      - name: --version on snapshot binary
        run: |
          # Cross-platform-ish: pick the matching linux/amd64 build.
          bin=$(find dist -type f -name clyde -path '*linux_amd64*' | head -1)
          if [ -z "$bin" ]; then
            echo "::error::no linux/amd64 snapshot binary found"
            ls -R dist
            exit 1
          fi
          "$bin" --version

  fuzz:
    name: fuzz (smoke, ~90s)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache: true

      - name: jsonl line decoder
        run: go test -fuzz=FuzzDecodeLineWithMsgID -fuzztime=15s ./internal/adapters/jsonl/

      - name: processscan ps output
        run: go test -fuzz=FuzzParseClaudeSessionIDs -fuzztime=15s ./internal/adapters/processscan/

      - name: git status parser
        run: go test -fuzz=FuzzParseStatus -fuzztime=15s ./internal/adapters/git/

      - name: git diff parser
        run: go test -fuzz=FuzzParseDiff -fuzztime=15s ./internal/adapters/git/

      - name: anthropicapi credentials
        run: go test -fuzz=FuzzParseCredentialsJSON -fuzztime=15s ./internal/adapters/anthropicapi/

      - name: claudesettings reader
        run: go test -fuzz=FuzzReadSettings -fuzztime=15s ./internal/adapters/claudesettings/
