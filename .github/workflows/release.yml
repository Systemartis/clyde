name: release

# Triggered by pushing a tag like v0.1.0. The tag itself is the source of truth
# for the version — goreleaser embeds it via ldflags into internal/version.
on:
  push:
    tags:
      - 'v*'

# Default-deny — the release job below explicitly grants what it needs.
permissions:
  contents: read

# A second tag push for the same ref shouldn't run goreleaser twice.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  goreleaser:
    name: goreleaser
    runs-on: ubuntu-latest
    permissions:
      contents: write       # required to create the GitHub release
      packages: write       # leaves room for future container/registry pushes
      id-token: write       # required by sigstore cosign keyless signing
      attestations: write   # SLSA build-provenance attestations
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          # goreleaser walks the full tag history to compute the changelog;
          # the default shallow clone breaks that.
          fetch-depth: 0
          # The release job pushes via GITHUB_TOKEN it sets in env, not the
          # persisted credential — drop the helper to shrink the blast radius.
          persist-credentials: false

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: '1.26'
          cache: true

      # syft generates SPDX SBOMs alongside the archives; cosign signs the
      # checksum manifest with a keyless OIDC certificate. Both are picked up
      # by goreleaser via PATH — no version pin in the config.
      - uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610 # v0
      - uses: sigstore/cosign-installer@398d4b0eeef1380460a10c8013a76f728fb906ac # v3

      - uses: goreleaser/goreleaser-action@e435ccd777264be153ace6237001ef4d979d3a7a # v6
        with:
          distribution: goreleaser
          version: '~> v2'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Required by `cosign sign-blob` keyless mode — Fulcio uses the
          # OIDC token to issue the signing certificate.
          COSIGN_YES: "true"

      # SLSA build provenance (in-toto attestation) for every archive
      # goreleaser produced. GitHub generates and stores the attestation in
      # the repo's /attestations endpoint — verifiable via:
      #
      #   gh attestation verify clyde_<v>_<os>_<arch>.tar.gz \
      #       --owner Systemartis
      #
      # This complements cosign's signature on checksums.txt: cosign proves
      # the manifest's authenticity, the attestation proves each binary was
      # built by this exact workflow on this exact tag (SLSA Level 3 provenance
      # level when running on the GitHub-hosted ubuntu runner).
      - name: attest build provenance
        uses: actions/attest-build-provenance@43d14bc2b83dec42d39ecae14e916627a18bb661 # v3
        with:
          subject-path: 'dist/clyde_*_*.tar.gz'
